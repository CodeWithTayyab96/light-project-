<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SmartLight IoT — Dashboard</title>
<script>
  if (localStorage.getItem('isLoggedIn') !== 'true') {
    window.location.href = '/login.html';
  }
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

<style>
  body { font-family: 'Inter', sans-serif; background: #04040f; color: white; margin: 0; }
  .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #04040f 100%); }
  .card { background: #11111d; border: 1px solid #222235; border-radius: 1rem; padding: 1.5rem; }
  .btn-primary { background: #7c3aed; color: white; font-weight: bold; padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; border: none; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-danger { background: #dc2626; color: white; font-weight: bold; padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; border: none; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline { background: transparent; border: 2px solid #33334d; color: white; font-weight: bold; padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; }
  .btn-outline:hover { background: rgba(255,255,255,0.05); }
  input { background: #1a1a2e; border: 2px solid #33334d; border-radius: 0.75rem; padding: 0.75rem; color: white; width: 100%; outline: none; }
  input:focus { border-color: #7c3aed; }
  #toastZone { position: fixed; top: 20px; right: 20px; z-index: 100000; pointer-events: none; }
  .toast { background: #11111d; border: 1px solid #7c3aed; padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.5rem; pointer-events: auto; }
</style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- NAV -->
<nav class="sticky top-0 z-50 bg-[#04040f]/90 backdrop-blur-md border-b border-[#222235] px-6 py-4 flex justify-between items-center">
  <div class="flex items-center gap-2 font-bold text-lg">🚗 SmartLight <span class="text-violet-500">IoT</span></div>
  <div class="flex gap-3">
    <button onclick="editConfig()" class="bg-[#1a1a2e] p-2 rounded-lg border border-[#33334d]">⚙️</button>
    <button onclick="showClearModal()" class="bg-red-900/20 p-2 rounded-lg border border-red-500/30">🗑️</button>
    <button onclick="simulate()" class="bg-violet-600 px-4 py-2 rounded-lg font-bold text-sm">⚡ Simulate</button>
    <div class="flex items-center gap-4 ml-2">
      <span class="text-xs text-gray-400 hidden sm:block">User: <span id="displayUser" class="text-violet-400 font-bold">...</span></span>
      <button onclick="logout()" class="bg-[#1a1a2e] px-4 py-2 rounded-lg border border-[#33334d] font-bold text-sm text-red-500">🚪 Logout</button>
    </div>
  </div>


</nav>

<main class="max-w-6xl mx-auto p-6 space-y-6">
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="card"><p class="text-gray-400 text-xs">TOTAL</p><p class="text-3xl font-bold" id="kpiTotal">0</p></div>
    <div class="card"><p class="text-gray-400 text-xs">TODAY</p><p class="text-3xl font-bold" id="kpiToday">0</p></div>
    <div class="card"><p class="text-gray-400 text-xs">LAST HOUR</p><p class="text-3xl font-bold" id="kpiHour">0</p></div>
    <div class="card"><p class="text-gray-400 text-xs">PEAK</p><p class="text-3xl font-bold" id="kpiPeak">00:00</p></div>
  </div>

  <div class="grid lg:grid-cols-3 gap-6">
    <div class="card flex flex-col items-center gap-6">
      <div id="lightStatus" class="text-6xl">💡</div>
      <div id="lightBadge" class="bg-red-900/20 text-red-500 px-4 py-1 rounded-full font-bold">LIGHT OFF</div>
      <div class="flex gap-2 w-full">
        <button onclick="sendCmd('light_on')" class="flex-1 bg-green-600/20 text-green-500 border border-green-500/30 py-2 rounded-lg font-bold">ON</button>
        <button onclick="sendCmd('light_off')" class="flex-1 bg-red-600/20 text-red-500 border border-red-500/30 py-2 rounded-lg font-bold">OFF</button>
        <button onclick="sendCmd('light_auto')" class="flex-1 bg-violet-600/20 text-violet-500 border border-violet-500/30 py-2 rounded-lg font-bold">AUTO</button>
      </div>
    </div>
    <div class="card lg:col-span-2 h-64">
      <canvas id="hourlyChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3 class="font-bold mb-4">Recent Events</h3>
    <div id="eventsList" class="space-y-2"></div>
  </div>
</main>

<!-- MODALS (Absolute Solid UI) -->
<div id="configModal" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;">
  <div style="background:#11111d; border:2px solid #7c3aed; border-radius:1rem; padding:2rem; width:100%; max-width:400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h2 style="font-size:1.5rem; font-weight:bold;">Settings</h2>
      <button onclick="closeModal()" style="background:transparent; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>
    <label style="display:block; font-size:0.75rem; color:#a78bfa; margin-bottom:0.5rem; font-weight:bold;">ESP32 IP ADDRESS</label>
    <input type="text" id="espIpInput" placeholder="e.g. 192.168.1.50">
    <div style="display:flex; gap:1rem; margin-top:1.5rem;">
      <button onclick="closeModal()" class="btn-outline" style="flex:1;">CANCEL</button>
      <button onclick="saveConfig()" id="saveConfigBtn" class="btn-primary" style="flex:1;">SAVE CHANGES</button>
    </div>
  </div>
</div>

<div id="clearModal" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;">
  <div style="background:#11111d; border:2px solid #dc2626; border-radius:1rem; padding:2rem; width:100%; max-width:400px;">
    <h2 style="font-size:1.5rem; font-weight:bold; margin-bottom:1rem;">Clear Data?</h2>
    <p style="color:#9ca3af; margin-bottom:1.5rem;">This will delete all records permanently.</p>
    <div style="display:flex; gap:1rem;">
      <button onclick="closeClearModal()" class="btn-outline" style="flex:1;">CANCEL</button>
      <button onclick="confirmClear()" id="confirmClearBtn" class="btn-danger" style="flex:1;">YES, CLEAR</button>
    </div>
  </div>
</div>

<div id="toastZone"></div>

<script>
const AUTH_HEADERS = { 
  'Content-Type': 'application/json', 
  'X-API-Key': 'university-project-2024',
  'X-User': localStorage.getItem('currentUser') || 'admin'
};
document.getElementById('displayUser').textContent = AUTH_HEADERS['X-User'];

function showToast(msg) {
  const z = document.getElementById('toastZone');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  z.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Modals
function editConfig() {
  document.getElementById('configModal').style.display = 'flex';
  fetch('/api/config', { headers: AUTH_HEADERS })
    .then(r=>r.json()).then(d => { document.getElementById('espIpInput').value = d.esp32_ip || ''; });
}
function closeModal() { document.getElementById('configModal').style.display = 'none'; }
function showClearModal() { document.getElementById('clearModal').style.display = 'flex'; }
function closeClearModal() { document.getElementById('clearModal').style.display = 'none'; }

// API Actions
async function saveConfig() {
  const ip = document.getElementById('espIpInput').value.trim();
  const btn = document.getElementById('saveConfigBtn');
  btn.disabled = true; btn.textContent = "Saving...";
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: AUTH_HEADERS,
      body: JSON.stringify({ esp32_ip: ip })
    });
    if(r.ok) { showToast("Settings Saved"); closeModal(); }
    else { alert("Error: " + r.status); }
  } catch(e) { alert("Network Error"); }
  finally { btn.disabled = false; btn.textContent = "SAVE CHANGES"; }
}

async function confirmClear() {
  const btn = document.getElementById('confirmClearBtn');
  btn.disabled = true; btn.textContent = "Clearing...";
  try {
    const r = await fetch('/api/clear', { method: 'POST', headers: AUTH_HEADERS });
    if(r.ok) { showToast("Data Cleared"); closeClearModal(); fetchStatus(); }
    else { alert("Clear Failed"); }
  } catch(e) { alert("Network Error"); }
  finally { btn.disabled = false; btn.textContent = "YES, CLEAR"; }
}

// Stats
let hourlyChart;
function initChart() {
  const ctx = document.getElementById('hourlyChart').getContext('2d');
  hourlyChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Vehicles', data: [], borderColor: '#7c3aed', tension: 0.3 }] },
    options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
  });
}

async function fetchStatus() {
  try {
    const r = await fetch('/api/status', { headers: AUTH_HEADERS });
    const d = await r.json();

    document.getElementById('kpiTotal').textContent = d.total_count;
    document.getElementById('kpiToday').textContent = d.today_count;
    document.getElementById('kpiHour').textContent = d.last_hour_count;
    document.getElementById('kpiPeak').textContent = d.peak_hour;
    
    const badge = document.getElementById('lightBadge');
    if(d.light_status === 'ON') {
      badge.className = "bg-green-900/20 text-green-500 px-4 py-1 rounded-full font-bold";
      badge.textContent = "LIGHT ON";
    } else {
      badge.className = "bg-red-900/20 text-red-500 px-4 py-1 rounded-full font-bold";
      badge.textContent = "LIGHT OFF";
    }

    hourlyChart.data.labels = d.hourly_data.map(x=>x.hour);
    hourlyChart.data.datasets[0].data = d.hourly_data.map(x=>x.count);
    hourlyChart.update('none');

    const ev = document.getElementById('eventsList');
    ev.innerHTML = d.recent_events.map(e => `<div class="p-2 border-b border-[#222235] text-sm">${e.detected_at} - Vehicle Detected</div>`).join('');
  } catch(e) {}
}

async function sendCmd(cmd) {
  fetch('/api/command', { method: 'POST', headers: AUTH_HEADERS, body: JSON.stringify({ command: cmd }) })
    .then(() => fetchStatus());
}

async function simulate() {
  fetch('/api/simulate', { 
    method: 'POST', 
    headers: AUTH_HEADERS,
    body: JSON.stringify({ user: AUTH_HEADERS['X-User'] })
  }).then(() => fetchStatus());
}


initChart();
fetchStatus();
setInterval(fetchStatus, 3000);
  function logout() {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('currentUser');
    window.location.href = '/login.html';
  }
</script>
</body>
</html>
